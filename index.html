<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
</head>

<body>
    <div class="datestamp">
        <div id="stamp" class="visualtimestamp"></div>
        <div id="difference"></div>
        <div class="bitwisetimestamp" id="bits" style="font-family: monospace" ;></div>
        <div class="qrstamp" id="qr"></div>
        <div class="qrstamp" id="qr2"></div>
    </div>
    <script src="/qr-creator"></script>
    <script src="ServerDate.js"></script>
    <script>
        function updateClocks() {
            var client = new Date();
            let timestamp = ServerDate.getTime();
            let time = {
                hours: ServerDate.getHours(),
                minutes: ServerDate.getMinutes(),
                seconds: ServerDate.getSeconds(),
                milliseconds: ServerDate.getMilliseconds(),
                offset: ServerDate - client,
                precision: ServerDate.getPrecision()
            }
            document.getElementById("stamp").innerHTML = time.hours.toString().padStart(2, '0') + ':' + time.minutes.toString().padStart(2, '0') + ':' + time.seconds.toString().padStart(2, '0') + '.' + time.milliseconds.toString().padStart(3, '0')
            document.getElementById("difference").innerHTML = time.offset + " &plusmn; " + time.precision + "ms";

            bitwiseTime = (time.minutes * 60 * 1000 + time.seconds * 1000 + time.milliseconds).toString(2)
            parityBit = false;
            for (const char of bitwiseTime) {
                if (char === '1')
                    parityBit = !parityBit
            }
            bitTimeString = (parityBit ? '1' : '0') + (bitwiseTime.padStart(22, '0'))

            //Bitwise qr
            document.getElementById('qr').innerHTML = '';
            QrCreator.render({
                text: bitwiseTime.padStart(22, '0'),
                radius: 0.0, // 0.0 to 0.5
                ecLevel: 'L', // L, M, Q, H
                fill: '#000000', // foreground color
                background: null, // color or null for transparent
                size: 128 // in pixels
            }, document.querySelector('#qr'));
            //Timestamp qr
            document.getElementById('qr2').innerHTML = '';
            QrCreator.render({
                text: time.hours.toString().padStart(2, '0') + ':' + time.minutes.toString().padStart(2, '0') + ':' + time.seconds.toString().padStart(2, '0') + '.' + time.milliseconds.toString().padStart(3, '0'),
                radius: 0.0, // 0.0 to 0.5
                ecLevel: 'L', // L, M, Q, H
                fill: '#000000', // foreground color
                background: null, // color or null for transparent
                size: 128 // in pixels
            }, document.querySelector('#qr2'));

            // ▁ █ ▔
            document.getElementById("bits").innerText = bitTimeString.replaceAll('0', '▔').replaceAll('1', '█')
        }

        // Display the clocks and update them every 10ms+(parityBit ? '1' : '0')
        updateClocks();
        setInterval(updateClocks, 10);
    </script>
</body>

</html>
